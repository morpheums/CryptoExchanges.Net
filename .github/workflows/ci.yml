name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore CryptoExchanges.Net.slnx

      - name: Build
        run: dotnet build CryptoExchanges.Net.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test CryptoExchanges.Net.slnx --no-build --configuration Release --verbosity normal --filter 'Category!=Integration'
