name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore CryptoExchanges.Net.sln

      - name: Build
        run: dotnet build CryptoExchanges.Net.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test CryptoExchanges.Net.sln --no-build --configuration Release --verbosity normal
